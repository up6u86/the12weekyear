<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>12 Week Year Dashboard</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 HTML2PDF (用於匯出 A4 PDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* 隱藏滾動條的輔助樣式 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 翻頁時鐘的半透明遮罩效果 */
    .flip-clock-mask {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.05), rgba(255,255,255,0));
      border-bottom: 1px solid rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* 桌面版任務表格專用的優雅捲軸，避免覆蓋內容 */
    .custom-scrollbar::-webkit-scrollbar {
      height: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e4e4e7;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #d4d4d8;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 使用 type="text/babel" data-type="module" 支援 ES Module Import -->
  <script type="text/babel" data-type="module">
    // --- 1. Firebase 雲端同步模組 (ESM CDN) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 💡 若要啟用雲端同步，請將您的 Firebase 設定貼入此處
    const firebaseConfig = {
      apiKey: "AIzaSyC3wmLa5LzK1gTdguArIbBjuIfMWmlrz5Q",
      authDomain: "the12weekyear.firebaseapp.com",
      projectId: "the12weekyear",
      storageBucket: "the12weekyear.firebasestorage.app",
      messagingSenderId: "937446028538",
      appId: "1:937446028538:web:2401bef679c800a6c10543",
      measurementId: "G-Z3NZK68VZJ"
    };

    let app, auth, db, appId = 'github-pages-12wy';
    if (firebaseConfig && firebaseConfig.apiKey) {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    }

    // --- 安全的 LocalStorage 操作 (防護 LINE/無痕模式崩潰) ---
    const safeGetItem = (key) => {
      try { return localStorage.getItem(key); } 
      catch (e) { console.warn("LocalStorage 讀取失敗:", e); return null; }
    };

    const safeSetItem = (key, value) => {
      try { localStorage.setItem(key, value); } 
      catch (e) { console.warn("LocalStorage 寫入失敗:", e); }
    };

    // --- 2. React Hooks ---
    const { useState, useEffect, useMemo } = React;

    // --- 3. 內聯 Lucide Icons ---
    const Icon = ({ d, children, className = "w-4 h-4", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {d && <path d={d} />}
        {children}
      </svg>
    );
    const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Icon>;
    const Cloud = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
    const UserCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Circle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
    const TrendingDown = (p) => <Icon {...p}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></Icon>;
    const TrendingUp = (p) => <Icon {...p}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
    const Activity = (p) => <Icon {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
    const ListTodo = (p) => <Icon {...p}><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
    const UploadIcon = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;

    // --- 4. 建立空白週期的輔助函數 & 初始資料 ---
    const createEmptyQuarter = () => ({
      lagging: [
        { id: 'g1', name: '目標1', start: 0, target: 100, current: 0, unit: '單位', reverse: false },
        { id: 'g2', name: '目標2', start: 0, target: 100, current: 0, unit: '單位', reverse: false },
        { id: 'g3', name: '目標3', start: 0, target: 100, current: 0, unit: '單位', reverse: false }
      ],
      history: {},
      weeks: {},
      review: ''
    });

    const INITIAL_DATA = {
      targetDate: '2026-12-31',
      visionTitle: '',
      visions: [],
      years: {
        "2026": {
          Q1: createEmptyQuarter(), Q2: createEmptyQuarter(),
          Q3: createEmptyQuarter(), Q4: createEmptyQuarter(),
          annualReview: ''
        }
      }
    };

    const QUARTERS = ['Q1', 'Q2', 'Q3', 'Q4'];
    const DAYS = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];

    // 🌟 擴充至 16 種獨立顏色
    const GOAL_COLORS = [
      { text: 'text-orange-500', hex: '#f97316' },
      { text: 'text-blue-500', hex: '#3b82f6' },
      { text: 'text-emerald-500', hex: '#10b981' },
      { text: 'text-purple-500', hex: '#a855f7' },
      { text: 'text-rose-500', hex: '#f43f5e' },
      { text: 'text-cyan-500', hex: '#06b6d4' },
      { text: 'text-amber-500', hex: '#f59e0b' },
      { text: 'text-indigo-500', hex: '#6366f1' },
      { text: 'text-lime-500', hex: '#84cc16' },
      { text: 'text-pink-500', hex: '#ec4899' },
      { text: 'text-teal-500', hex: '#14b8a6' },
      { text: 'text-fuchsia-500', hex: '#d946ef' },
      { text: 'text-sky-500', hex: '#0ea5e9' },
      { text: 'text-violet-500', hex: '#8b5cf6' },
      { text: 'text-yellow-500', hex: '#eab308' },
      { text: 'text-red-500', hex: '#ef4444' }
    ];

    const calculateProgress = (goal) => {
      const start = Number(goal.start);
      const target = Number(goal.target);
      const current = Number(goal.current);
      if (start === target) return current === target ? 100 : 0;
      if (start > target) {
        if (current >= start) return 0;
        if (current <= target) return 100;
        return ((start - current) / (start - target)) * 100;
      } else {
        if (current <= start) return 0;
        if (current >= target) return 100;
        return ((current - start) / (target - start)) * 100;
      }
    };

    const getThresholdColorText = (score) => {
      if (score >= 76) return 'text-emerald-500';
      if (score >= 51) return 'text-amber-500';
      return 'text-zinc-800'; 
    };

    const getThresholdColorBg = (score) => {
      if (score >= 76) return 'bg-emerald-500';
      if (score >= 51) return 'bg-amber-500';
      return 'bg-zinc-800'; 
    };

    const getTaskCompletionRate = (task) => {
      const checkedCount = task.days.filter(Boolean).length;
      const target = task.targetDays || 7; 
      return Math.min(100, Math.round((checkedCount / target) * 100));
    };

    const getGoalGapAtWeek = (goalId, targetWeek, historyObj) => {
      for (let w = targetWeek; w >= 1; w--) {
        if (historyObj[w] !== undefined) {
          if (typeof historyObj[w] === 'number') return historyObj[w]; 
          if (historyObj[w][goalId] !== undefined) return historyObj[w][goalId];
        }
      }
      return 100;
    };

    // 🌟 終極資料縫合演算法 (Deep Merge Rescue)
    const masterMerge = (dataA, dataB) => {
      const merged = JSON.parse(JSON.stringify(INITIAL_DATA)); 

      const mergeText = (t1, t2) => {
          const s1 = (t1 || '').trim();
          const s2 = (t2 || '').trim();
          if (!s1) return s2;
          if (!s2) return s1;
          if (s1 === s2 || s1.includes(s2)) return s1;
          if (s2.includes(s1)) return s2;
          return s1 + '\n\n' + s2;
      };

      // 1. 救援 願景 Visions
      const allVisions = new Set();
      const extractVisions = (d) => {
          if (Array.isArray(d?.visions)) d.visions.forEach(v => { if (v && v.trim()) allVisions.add(v.trim()); });
      };
      extractVisions(dataA); extractVisions(dataB);
      merged.visions = Array.from(allVisions);

      // Vision Title & Target Date
      merged.visionTitle = mergeText(dataA?.visionTitle, dataB?.visionTitle) || '';
      merged.targetDate = dataB?.targetDate || dataA?.targetDate || '2026-12-31';

      // 2. 救援 跨年份資料
      const allYears = new Set([...Object.keys(dataA?.years || {}), ...Object.keys(dataB?.years || {}), "2026"]);

      allYears.forEach(y => {
          if (!merged.years[y]) merged.years[y] = { Q1: createEmptyQuarter(), Q2: createEmptyQuarter(), Q3: createEmptyQuarter(), Q4: createEmptyQuarter(), annualReview: '' };
          
          ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => {
              const qA = dataA?.years?.[y]?.[q] || (y === "2026" ? dataA?.[q] : null);
              const qB = dataB?.years?.[y]?.[q] || (y === "2026" ? dataB?.[q] : null);
              
              const mergedQ = createEmptyQuarter();
              
              // Review
              mergedQ.review = mergeText(qA?.review, qB?.review);

              // Lagging
              const mapL = new Map();
              const scoreL = (g) => {
                  let s = 0;
                  if (g.name && !g.name.includes('目標')) s += 10;
                  if (g.current !== 0) s += 5;
                  if (g.target !== 100 && g.target !== 0) s += 5;
                  if (g.start !== 0) s += 5;
                  return s;
              };
              [...(qA?.lagging || []), ...(qB?.lagging || [])].forEach(g => {
                  const key = g.id || g.name;
                  if (!mapL.has(key)) mapL.set(key, g);
                  else if (scoreL(g) > scoreL(mapL.get(key))) mapL.set(key, g);
              });
              mergedQ.lagging = Array.from(mapL.values());
              if(mergedQ.lagging.length === 0) mergedQ.lagging = createEmptyQuarter().lagging;

              // History
              mergedQ.history = { ...(qA?.history || {}), ...(qB?.history || {}) };

              // Weeks
              const allW = new Set([...Object.keys(qA?.weeks || {}), ...Object.keys(qB?.weeks || {})]);
              allW.forEach(w => {
                  const wA = qA?.weeks?.[w];
                  const wB = qB?.weeks?.[w];
                  if (wA && !wB) mergedQ.weeks[w] = wA;
                  else if (!wA && wB) mergedQ.weeks[w] = wB;
                  else if (wA && wB) {
                      const mapT = new Map();
                      const scoreT = (t) => {
                          let s = 0;
                          if (t.name && t.name !== '新任務') s += 10;
                          if (t.note) s += 5;
                          if (t.goalId) s += 2;
                          s += (t.days || []).filter(Boolean).length;
                          if (t.targetDays !== 7) s += 2;
                          return s;
                      };
                      [...(wA.tasks || []), ...(wB.tasks || [])].forEach(t => {
                          if (!mapT.has(t.id)) mapT.set(t.id, t);
                          else if (scoreT(t) > scoreT(mapT.get(t.id))) mapT.set(t.id, t);
                      });
                      mergedQ.weeks[w] = {
                          isEdited: wA.isEdited || wB.isEdited,
                          tasks: Array.from(mapT.values())
                      };
                  }
              });
              merged.years[y][q] = mergedQ;
          });

          // Annual Review
          const annA = dataA?.years?.[y]?.annualReview || (y === "2026" ? dataA?.annualReview : '');
          const annB = dataB?.years?.[y]?.annualReview || (y === "2026" ? dataB?.annualReview : '');
          merged.years[y].annualReview = mergeText(annA, annB);
      });

      return merged;
    };

    // --- 6. 應用主元件 ---
    function App() {
      const [user, setUser] = useState(null);
      
      const [data, setData] = useState(() => {
        const saved = safeGetItem('12wy_data');
        const localData = saved ? JSON.parse(saved) : null;
        return masterMerge(localData, null); 
      });
      
      const [currentYear, setCurrentYear] = useState(() => safeGetItem('12wy_year') || '2026');
      const [currentQuarter, setCurrentQuarter] = useState(() => safeGetItem('12wy_quarter') || 'Q1');
      const [currentWeek, setCurrentWeek] = useState(() => {
        const saved = safeGetItem('12wy_week');
        return saved === 'review' ? 'review' : (saved ? parseInt(saved, 10) : 1);
      });
      
      const [isAuthChecking, setIsAuthChecking] = useState(true);
      const [isSyncing, setIsSyncing] = useState(false);
      const [hasLoadWarning, setHasLoadWarning] = useState(false); 
      
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login'); 
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState('');

      const [showYearModal, setShowYearModal] = useState(false);
      const [yearInput, setYearInput] = useState('');

      // 🌟 新增：自訂對話框 (Dialog) 狀態，徹底解決瀏覽器阻擋 confirm() 的問題
      const [dialog, setDialog] = useState({ isOpen: false, type: 'confirm', message: '', onConfirm: null });

      const [showPasteModal, setShowPasteModal] = useState(false);
      const [pasteText, setPasteText] = useState('');

      const today = new Date();
      const todayStr = `${today.getMonth() + 1}/${today.getDate()}`;
      const targetDateObj = data?.targetDate ? new Date(data.targetDate) : new Date('2026-12-31');
      const diffTime = targetDateObj - today;
      let diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      if (diffDays < 0) diffDays = 0;
      const remainingWeeks = Math.floor(diffDays / 7);
      const remainingDays = diffDays % 7;

      // 記錄分頁狀態
      useEffect(() => { safeSetItem('12wy_year', currentYear); }, [currentYear]);
      useEffect(() => { safeSetItem('12wy_quarter', currentQuarter); }, [currentQuarter]);
      useEffect(() => { safeSetItem('12wy_week', currentWeek); }, [currentWeek]);

      // 🌟 完美修復 textarea 重新整理後變形/加寬的問題
      useEffect(() => {
        let count = 0;
        const interval = setInterval(() => {
          const textareas = document.querySelectorAll('.vision-textarea');
          textareas.forEach(ta => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
          });
          if (++count > 5) clearInterval(interval); // 反覆對齊 5 次確保渲染完畢
        }, 100);
        return () => clearInterval(interval);
      }, [data?.visions, currentQuarter, currentWeek, currentYear]);

      // 1. 初始化 Auth 與 Persistence
      useEffect(() => {
        if (!auth) return;
        try {
          setPersistence(auth, browserLocalPersistence).catch((error) => {
            console.warn("無法啟用本地持久化:", error);
            setHasLoadWarning(true);
          }).finally(() => {
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              setUser(u);
              if (!u) {
                signInAnonymously(auth).catch((error) => {
                  console.warn("匿名登入失敗/受限:", error);
                  setHasLoadWarning(true);
                });
              }
            });
            return () => unsubscribe();
          });
        } catch (e) {
          console.error("Auth 初始化錯誤:", e);
          setHasLoadWarning(true);
        }
      }, []);

      // 2. 獲取遠端資料庫並進行「終極縫合」
      useEffect(() => {
        if (!auth || !user) return;
        setIsSyncing(true);

        let syncTimeoutId = setTimeout(() => {
          if (isSyncing) {
            setIsSyncing(false);
            setHasLoadWarning(true);
          }
        }, 5000);

        try {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'dashboard');
          const unsubscribe = onSnapshot(docRef, (docSnap) => {
            clearTimeout(syncTimeoutId);
            if (docSnap.exists() && !docSnap.metadata.hasPendingWrites) {
              const cloudData = docSnap.data().payload;
              const saved = safeGetItem('12wy_data');
              const localData = saved ? JSON.parse(saved) : null;
              
              // 🌟 將本地殘存的紀錄與雲端的資料完美縫合
              const finalData = masterMerge(localData, cloudData);
              setData(finalData);
              safeSetItem('12wy_data', JSON.stringify(finalData));
              // 將救回的資料推回雲端
              setDoc(docRef, { payload: finalData }, { merge: true }).catch(() => {});
            } else if (!docSnap.exists()) {
              // 雲端為空時，將本地打撈完畢的資料推上去
              setDoc(docRef, { payload: data }, { merge: false }).catch(() => {});
            }
            setIsSyncing(false);
          }, (err) => {
            console.error("Firestore 監聽失敗:", err);
            clearTimeout(syncTimeoutId);
            setIsSyncing(false);
            setHasLoadWarning(true);
          });

          return () => {
            clearTimeout(syncTimeoutId);
            unsubscribe();
          };
        } catch (e) {
          console.error("Firestore 初始化錯誤:", e);
          clearTimeout(syncTimeoutId);
          setIsSyncing(false);
          setHasLoadWarning(true);
        }
      }, [user]);

      // 3. 雲端與本地同步保存函數
      const saveToCloud = (newData) => {
        setData(newData);
        safeSetItem('12wy_data', JSON.stringify(newData));
        if (auth && user) {
          const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'dashboard');
          setDoc(docRef, { payload: newData }, { merge: true }).catch(e => {
            console.warn("寫入雲端失敗 (可能無網路):", e);
          });
        }
      };

      // 4. 處理帳號登入與註冊
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthError('');
        setAuthLoading(true);
        try {
          if (authMode === 'register') {
            await createUserWithEmailAndPassword(auth, authEmail, authPassword);
            if (data && auth.currentUser) {
              const docRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'data', 'dashboard');
              await setDoc(docRef, { payload: data }, { merge: true });
            }
          } else {
            await signInWithEmailAndPassword(auth, authEmail, authPassword);
          }
          setShowAuthModal(false);
          setAuthEmail('');
          setAuthPassword('');
          setHasLoadWarning(false);
        } catch (err) {
          if (err.code === 'auth/configuration-not-found' || err.code === 'auth/operation-not-allowed') {
            setAuthError('Firebase 尚未啟用「電子郵件/密碼」驗證功能，請至控制台設定');
          } else {
            setAuthError(err.code === 'auth/email-already-in-use' ? '此信箱已註冊' : 
                         err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential' ? '帳號或密碼錯誤' : 
                         err.code === 'auth/user-not-found' ? '找不到此帳號' : '發生錯誤，請檢查信箱與密碼格式');
          }
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        try { await signInAnonymously(auth); } catch (error) { console.error(error); }
      };

      // 🌟 手動備份資料 (JSON 格式)
      const exportJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `12WeekYear_Backup_${currentYear}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click(); downloadAnchorNode.remove();
      };

      // 🌟 手動匯入資料 (防呆機制：不再使用 native alert)
      const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const imported = JSON.parse(event.target.result);
            if (imported.years || imported.lagging) {
                saveToCloud(masterMerge(data, imported));
            } else {
                setDialog({ isOpen: true, type: 'alert', message: '檔案格式不正確，無法匯入！', onConfirm: null });
            }
          } catch (err) { 
              setDialog({ isOpen: true, type: 'alert', message: '解析 JSON 失敗，請確認檔案是否損毀！', onConfirm: null });
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // 重置 input 讓下次同檔名也能觸發
      };

      // 🌟 匯出為 A4 直立 PDF (鎖定 WindowWidth 確保完美裁切)
      const exportPDF = () => {
        const element = document.getElementById('pdf-export-area');
        const opt = {
          margin:       [10, 10, 10, 10],
          filename:     `12WeekYear_${currentYear}_${currentQuarter}_W${currentWeek}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true, windowWidth: 1200, backgroundColor: '#fafafa' },
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak:    { mode: 'css' }
        };
        window.html2pdf().set(opt).from(element).save();
      };

      // --- 年份與總結操作 ---
      const openYearModal = () => {
        const nextYearStr = (parseInt(currentYear) + 1).toString();
        setYearInput(nextYearStr);
        setShowYearModal(true);
      };

      const confirmAddYear = () => {
        const yStr = yearInput.trim();
        if (!yStr) return;
        if (!data.years[yStr]) {
          const newData = { ...data };
          newData.years[yStr] = {
            Q1: createEmptyQuarter(), Q2: createEmptyQuarter(),
            Q3: createEmptyQuarter(), Q4: createEmptyQuarter(),
            annualReview: ''
          };
          saveToCloud(newData);
          setCurrentYear(yStr);
          setCurrentQuarter('Q1');
          setCurrentWeek(1);
        } else {
          setCurrentYear(yStr);
        }
        setShowYearModal(false);
      };

      const updateQuarterlyReview = (text) => {
        const newData = { ...data };
        newData.years[currentYear][currentQuarter].review = text;
        saveToCloud(newData);
      };

      const updateAnnualReview = (text) => {
        const newData = { ...data };
        newData.years[currentYear].annualReview = text;
        saveToCloud(newData);
      };

      const updateVisionTitle = (e) => saveToCloud({ ...data, visionTitle: e.target.value });
      const updateTargetDate = (e) => saveToCloud({ ...data, targetDate: e.target.value });
      const updateVisionItem = (index, value) => {
        const newVisions = [...data.visions];
        newVisions[index] = value;
        saveToCloud({ ...data, visions: newVisions });
      };
      const addVisionItem = () => saveToCloud({ ...data, visions: [...data.visions, ''] });
      const removeVisionItem = (index) => {
        const newVisions = data.visions.filter((_, i) => i !== index);
        saveToCloud({ ...data, visions: newVisions });
      };

      const handleQuarterChange = (q) => {
        setCurrentQuarter(q);
        setCurrentWeek(1);
      };

      const addLaggingGoal = () => {
        if(!data || currentQuarter === 'annual') return;
        const newData = { ...data };
        const currentQData = { ...newData.years[currentYear][currentQuarter] };
        const newGoalId = `g_${Date.now()}`;
        const newGoal = {
          id: newGoalId,
          name: `目標${currentQData.lagging.length + 1}`,
          start: 0,
          target: 100,
          current: 0,
          unit: '單位',
          reverse: false
        };
        currentQData.lagging = [...currentQData.lagging, newGoal];
        newData.years[currentYear][currentQuarter] = currentQData;
        saveToCloud(newData);
      };

      // 🌟 使用自訂對話框 (Dialog) 取代原生 confirm()
      const deleteLaggingGoal = (goalId) => {
        if (!data || currentQuarter === 'annual') return;
        setDialog({
          isOpen: true,
          type: 'confirm',
          message: '確定要刪除這個目標嗎？相關任務將會變更為「無關聯目標」。',
          onConfirm: () => {
            const newData = { ...data };
            const currentQData = { ...newData.years[currentYear][currentQuarter] };
            
            currentQData.lagging = currentQData.lagging.filter(g => g.id !== goalId);
            Object.values(currentQData.weeks).forEach(w => {
              if(w.tasks) {
                 w.tasks = w.tasks.map(t => t.goalId === goalId ? { ...t, goalId: '' } : t);
              }
            });
            newData.years[currentYear][currentQuarter] = currentQData;
            saveToCloud(newData);
          }
        });
      };

      const activeQuarter = (currentQuarter !== 'annual') && data?.years?.[currentYear] ? data.years[currentYear][currentQuarter] : null;

      const activeWeekData = useMemo(() => {
        if (!activeQuarter || currentWeek === 'review') return { tasks: [], isInherited: false };
        if (activeQuarter.weeks[currentWeek] && activeQuarter.weeks[currentWeek].isEdited) {
          return { ...activeQuarter.weeks[currentWeek], isInherited: false };
        }
        let latestWeek = null;
        for (let w = currentWeek - 1; w >= 1; w--) {
          if (activeQuarter.weeks[w] && activeQuarter.weeks[w].isEdited) {
            latestWeek = w; break;
          }
        }
        if (latestWeek) {
          const inheritedTasks = activeQuarter.weeks[latestWeek].tasks.map(t => ({
            ...t, days: Array(7).fill(false)
          }));
          return { tasks: inheritedTasks, isInherited: true };
        }
        return { tasks: [], isInherited: false };
      }, [activeQuarter, currentWeek]);

      const handleTaskAction = (actionCallback) => {
        if(!data || currentWeek === 'review' || currentQuarter === 'annual') return;
        const newData = { ...data };
        const currentQData = { ...newData.years[currentYear][currentQuarter] };
        let targetWeek = currentQData.weeks[currentWeek];

        if (!targetWeek || !targetWeek.isEdited) {
          const baseTasks = activeWeekData.tasks.map(t => ({ ...t, days: [...t.days] }));
          targetWeek = { isEdited: true, tasks: baseTasks };
        } else {
          targetWeek = { ...targetWeek, tasks: targetWeek.tasks.map(t => ({ ...t, days: [...t.days] })) };
        }

        targetWeek.tasks = actionCallback(targetWeek.tasks);
        currentQData.weeks = { ...currentQData.weeks, [currentWeek]: targetWeek };
        newData.years[currentYear][currentQuarter] = currentQData;
        saveToCloud(newData);
      };

      const toggleDay = (taskId, dayIndex) => handleTaskAction(tasks => tasks.map(t => t.id === taskId ? { ...t, days: t.days.map((d, i) => i === dayIndex ? !d : d) } : t));
      const updateTaskName = (taskId, newName) => handleTaskAction(tasks => tasks.map(t => t.id === taskId ? { ...t, name: newName } : t));
      const updateTaskGoal = (taskId, newGoalId) => handleTaskAction(tasks => tasks.map(t => t.id === taskId ? { ...t, goalId: newGoalId } : t));
      const updateTaskTargetDays = (taskId, target) => {
        let val = target;
        if (val !== '') {
          val = parseInt(target, 10);
          if (isNaN(val)) val = ''; else if (val > 7) val = 7; else if (val < 1) val = 1;
        }
        handleTaskAction(tasks => tasks.map(t => t.id === taskId ? { ...t, targetDays: val } : t));
      };
      const updateTaskNote = (taskId, noteText) => handleTaskAction(tasks => tasks.map(t => t.id === taskId ? { ...t, note: noteText } : t));
      const addTask = () => handleTaskAction(tasks => [...tasks, { id: `t_${Date.now()}`, name: '新任務', goalId: '', targetDays: 7, note: '', days: Array(7).fill(false) }]);
      
      // 🌟 使用自訂對話框 (Dialog) 取代原生 confirm()
      const deleteTask = (taskId) => { 
         setDialog({
            isOpen: true,
            type: 'confirm',
            message: '確定要刪除此任務嗎？',
            onConfirm: () => handleTaskAction(tasks => tasks.filter(t => t.id !== taskId))
         });
      };

      const handleBatchImport = () => {
        if (!pasteText.trim()) return;
        const lines = pasteText.split('\n');
        const newTasks = [];
        const currentLagging = activeQuarter.lagging;

        lines.forEach(line => {
          const cols = line.split('\t');
          if (!cols[0] || !cols[0].trim()) return;
          const name = cols[0].trim();
          
          let goalId = '';
          if (cols[1]) {
            const goalNameInput = cols[1].trim();
            const matchedGoal = currentLagging.find(g => g.name === goalNameInput);
            if (matchedGoal) goalId = matchedGoal.id;
          }

          let targetDays = 7;
          if (cols[2]) {
            const parsedDays = parseInt(cols[2].trim(), 10);
            if (!isNaN(parsedDays) && parsedDays >= 1 && parsedDays <= 7) targetDays = parsedDays;
          }

          const note = cols[3] ? cols[3].trim() : '';
          newTasks.push({ id: `t_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`, name, goalId, targetDays, note, days: Array(7).fill(false) });
        });

        if (newTasks.length > 0) handleTaskAction(tasks => [...tasks, ...newTasks]);
        setShowPasteModal(false); setPasteText('');
      };

      const updateLaggingCurrent = (goalId, newCurrent) => {
        const val = Number(newCurrent);
        if (isNaN(val) || !data || currentQuarter === 'annual') return;

        const newData = { ...data };
        const currentQData = { ...newData.years[currentYear][currentQuarter] };
        const newLagging = currentQData.lagging.map(g => g.id === goalId ? { ...g, current: val } : g);
        const currentGaps = newLagging.reduce((acc, g) => ({...acc, [g.id]: Math.max(0, 100 - calculateProgress(g))}), {});
        const currentW = currentWeek === 'review' ? 12 : currentWeek;
        const newHistory = { ...currentQData.history, [currentW]: currentGaps };
        
        currentQData.lagging = newLagging; currentQData.history = newHistory; newData.years[currentYear][currentQuarter] = currentQData;
        saveToCloud(newData);
      };

      const updateLaggingField = (goalId, field, value) => {
        if(!data || currentQuarter === 'annual') return;
        const newData = { ...data };
        const currentQData = { ...newData.years[currentYear][currentQuarter] };
        
        let finalValue = value;
        if (field === 'start' || field === 'target') {
          finalValue = Number(value);
          if (isNaN(finalValue)) finalValue = 0;
        }

        currentQData.lagging = currentQData.lagging.map(g => g.id === goalId ? { ...g, [field]: finalValue } : g);
        
        if (field === 'start' || field === 'target') {
           const currentGaps = currentQData.lagging.reduce((acc, g) => ({...acc, [g.id]: Math.max(0, 100 - calculateProgress(g))}), {});
           const currentW = currentWeek === 'review' ? 12 : currentWeek;
           currentQData.history = { ...currentQData.history, [currentW]: currentGaps };
        }

        newData.years[currentYear][currentQuarter] = currentQData;
        saveToCloud(newData);
      };

      if (!data) return null; // 透過 Optimistic UI 完全不阻擋渲染

      // --- 領先指標運算 ---
      const taskScores = activeWeekData.tasks.map(t => getTaskCompletionRate(t));
      const leadingScore = taskScores.length === 0 ? 0 : Math.round(taskScores.reduce((a, b) => a + b, 0) / taskScores.length);

      let cumScoreSum = 0;
      let cumTaskCount = 0;
      const targetW = currentWeek === 'review' ? 12 : currentWeek;
      if (activeQuarter) {
        for (let w = 1; w <= targetW; w++) {
          const wData = activeQuarter.weeks[w];
          if (wData && wData.isEdited) {
            wData.tasks.forEach(t => { cumScoreSum += getTaskCompletionRate(t); cumTaskCount++; });
          }
        }
      }
      const cumulativeLeadingScore = cumTaskCount === 0 ? 0 : Math.round(cumScoreSum / cumTaskCount);

      // --- 專屬年度總結的資料運算 ---
      let annualLeadingScore = 0;
      let annualLaggingScore = 0;
      let annualTaskCountForUI = 0;
      const annualGoalsList = [];

      if (currentQuarter === 'annual' && data?.years?.[currentYear]) {
        let annualTaskScoreSum = 0;
        let annualProgressSum = 0;
        
        QUARTERS.forEach(q => {
          const qData = data.years[currentYear][q];
          if (!qData) return;
          
          for (let w = 1; w <= 12; w++) {
            const wData = qData.weeks[w];
            if (wData && wData.isEdited) {
              wData.tasks.forEach(t => {
                annualTaskScoreSum += getTaskCompletionRate(t);
                annualTaskCountForUI++;
              });
            }
          }

          qData.lagging.forEach((goal, i) => {
             const prog = calculateProgress(goal);
             annualProgressSum += prog;
             annualGoalsList.push({ ...goal, quarter: q, progress: prog, colorConfig: GOAL_COLORS[annualGoalsList.length % GOAL_COLORS.length] });
          });
        });

        annualLeadingScore = annualTaskCountForUI === 0 ? 0 : Math.round(annualTaskScoreSum / annualTaskCountForUI);
        annualLaggingScore = annualGoalsList.length > 0 ? Math.round(annualProgressSum / annualGoalsList.length) : 0;
      }

      return (
        <div id="pdf-export-area" className="min-h-screen bg-[#fafafa] text-zinc-900 font-sans pb-20 selection:bg-zinc-200">
          
          {/* ================= 頂部導航列 ================= */}
          <header className="px-4 sm:px-8 py-6 max-w-6xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-4 sm:gap-0">
            <div className="flex flex-col sm:flex-row sm:items-center space-y-4 sm:space-y-0 sm:space-x-6">
              
              <div className="flex items-center space-x-3">
                <div className="w-8 h-8 bg-zinc-900 rounded-lg flex items-center justify-center shadow-sm shrink-0">
                  <Target className="w-5 h-5 text-white" />
                </div>
                
                {/* 🌟 年份切換器 */}
                <div className="flex items-center space-x-1">
                  <select 
                    value={currentYear} 
                    onChange={(e) => { setCurrentYear(e.target.value); setCurrentQuarter('Q1'); setCurrentWeek(1); }}
                    className="font-bold text-xl bg-transparent focus:outline-none cursor-pointer appearance-none"
                  >
                    {Object.keys(data.years).sort().map(y => <option key={y} value={y}>{y} 年</option>)}
                  </select>
                  <button onClick={openYearModal} className="text-zinc-400 hover:text-zinc-900 transition-colors p-1" title="新增年份" data-html2canvas-ignore="true">
                    <Plus className="w-4 h-4" />
                  </button>
                </div>
              </div>
              
              {/* 🌟 季度與年度總結切換 */}
              <div className="flex bg-zinc-100 p-1 rounded-lg overflow-x-auto scrollbar-hide" data-html2canvas-ignore="true">
                {[...QUARTERS, 'annual'].map(q => (
                  <button
                    key={q}
                    onClick={() => handleQuarterChange(q)}
                    className={`
                      px-3 sm:px-4 py-1 sm:py-1.5 text-xs sm:text-sm font-medium rounded-md transition-all whitespace-nowrap
                      ${currentQuarter === q ? 'bg-white text-zinc-900 shadow-sm' : 'text-zinc-500 hover:text-zinc-700'}
                    `}
                  >
                    {q === 'annual' ? '🏆 年度總結' : q}
                  </button>
                ))}
              </div>
            </div>
            
            {/* 🌟 頂部右側按鈕群 */}
            <div className="flex flex-col items-end space-y-3 shrink-0" data-html2canvas-ignore="true">
              <div className="flex items-center space-x-3 text-xs sm:text-sm">
                <span className="text-xs font-normal text-zinc-400 bg-zinc-100 px-2 py-1 rounded">今日 {todayStr}</span>
                {auth && user && !user.isAnonymous ? (
                  <div className="flex items-center space-x-2 sm:space-x-3">
                    {isSyncing ? (
                      <div className="hidden sm:flex items-center text-blue-500 font-medium px-2 py-1 bg-blue-50 rounded-full">
                         <Cloud className="w-3.5 h-3.5 mr-1.5 animate-pulse" /> 同步中
                      </div>
                    ) : (
                      <div className="hidden sm:flex items-center text-emerald-500 font-medium px-2 py-1 bg-emerald-50 rounded-full">
                         <Cloud className="w-3.5 h-3.5 mr-1.5" /> 已同步
                      </div>
                    )}
                    {/* 🌟 手機版與桌面版皆顯示的登出按鈕 */}
                    <button onClick={handleLogout} className="flex items-center space-x-1.5 text-zinc-500 hover:text-zinc-900 transition-colors bg-white px-3 py-1.5 rounded-full shadow-sm border border-zinc-200">
                      <LogOut className="w-4 h-4" />
                      <span className="font-medium">登出</span>
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setShowAuthModal(true)} className="flex items-center space-x-1.5 text-blue-500 hover:text-blue-600 transition-colors font-medium px-3 py-1.5 bg-blue-50 rounded-full">
                    <UserCircle className="w-4 h-4" />
                    <span className="hidden sm:inline">登入以同步</span>
                    <span className="sm:hidden">登入同步</span>
                  </button>
                )}
              </div>
              
              {/* 🌟 匯入與備份按鈕列 (桌面顯示) */}
              <div className="hidden sm:flex items-center space-x-2">
                <label className="cursor-pointer text-xs text-zinc-400 hover:text-zinc-700 transition-colors flex items-center px-1">
                   <UploadIcon className="w-3.5 h-3.5 mr-1" /> 匯入 JSON
                   <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                </label>
                <span className="text-zinc-300">|</span>
                <button onClick={exportJSON} className="text-xs text-zinc-400 hover:text-zinc-700 transition-colors flex items-center px-1">
                   <Download className="w-3.5 h-3.5 mr-1" /> 匯出 JSON
                </button>
                <button onClick={exportPDF} className="flex items-center space-x-1.5 text-zinc-600 hover:text-zinc-900 transition-colors text-xs bg-white border border-zinc-200 px-3 py-1.5 rounded-lg shadow-sm ml-2">
                  <FileText className="w-3.5 h-3.5" />
                  <span className="font-medium">下載 PDF</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 sm:px-8 space-y-8 sm:space-y-12">
            
            {/* === 🏆 年度總結專屬畫面 === */}
            {currentQuarter === 'annual' ? (
              <section className="bg-white p-6 sm:p-10 rounded-[2rem] border border-yellow-200 shadow-sm animate-in fade-in duration-500">
                <div className="max-w-4xl mx-auto">
                  <div className="text-center mb-8">
                    <span className="text-4xl mb-4 block">🏆</span>
                    <h2 className="text-2xl sm:text-3xl font-bold text-zinc-800 mb-2">{currentYear} 年度總結</h2>
                    <p className="text-zinc-500 text-sm sm:text-base">一年過去了，回顧你完成的四個 12 週計畫，感謝自己的堅持與成長。</p>
                  </div>
                  
                  {/* 🌟 年度總結數據儀表板 */}
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                     <div className="bg-zinc-50 rounded-2xl p-6 flex items-center justify-between border border-zinc-100">
                        <div>
                          <h4 className="text-zinc-500 text-sm font-medium mb-1">年度總行動達成率 (Leading)</h4>
                          <p className={`text-4xl font-light ${getThresholdColorText(annualLeadingScore)}`}>{annualLeadingScore}%</p>
                          <p className="text-xs text-zinc-400 mt-2">全年共執行 {annualTaskCountForUI} 項行動任務</p>
                        </div>
                        <div className="w-20 h-20 relative shrink-0">
                          <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                            <path className="text-zinc-200" strokeWidth="3.5" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path className={`${getThresholdColorText(annualLeadingScore)} transition-all duration-1000 ease-out`} strokeDasharray={`${annualLeadingScore}, 100`} strokeWidth="3.5" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                          </svg>
                        </div>
                     </div>

                     <div className="bg-zinc-50 rounded-2xl p-6 flex items-center justify-between border border-zinc-100">
                        <div>
                          <h4 className="text-zinc-500 text-sm font-medium mb-1">年度大計畫實現率 (Lagging)</h4>
                          <p className={`text-4xl font-light ${getThresholdColorText(annualLaggingScore)}`}>{annualLaggingScore}%</p>
                          <p className="text-xs text-zinc-400 mt-2">{annualGoalsList.length} 項核心目標的平均達成度</p>
                        </div>
                        <div className="w-20 h-20 relative shrink-0">
                          <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                            <path className="text-zinc-200" strokeWidth="3.5" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path className={`${getThresholdColorText(annualLaggingScore)} transition-all duration-1000 ease-out`} strokeDasharray={`${annualLaggingScore}, 100`} strokeWidth="3.5" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                          </svg>
                        </div>
                     </div>
                  </div>

                  {/* 🌟 12項核心目標明細 (動態數量) */}
                  <div className="mb-10 space-y-6">
                    <h3 className="font-semibold text-zinc-700 text-lg flex items-center border-b border-zinc-100 pb-3">
                      <Target className="w-5 h-5 mr-2 text-zinc-400"/> 全年 {annualGoalsList.length} 項大計畫回顧
                    </h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {annualGoalsList.map((g, idx) => (
                        <div key={`${g.quarter}-${g.id}-${idx}`} className="bg-white border border-zinc-100 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow">
                          <div className="flex justify-between items-start mb-3">
                            <div className="flex items-center space-x-2 w-2/3">
                              <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-zinc-100 text-zinc-500 shrink-0">{g.quarter}</span>
                              <span className={`font-medium text-sm truncate ${g.colorConfig.text}`}>{g.name || '未命名目標'}</span>
                            </div>
                            <span className={`text-xs font-bold ${getThresholdColorText(g.progress)} bg-zinc-50 px-2 py-0.5 rounded shrink-0`}>
                              達成率 {Math.round(g.progress * 10) / 10}%
                            </span>

                          />
                       </div>
                    ) : (
                       /* === W1~W12 任務清單 === */
                       <>
                        <div className={`px-4 sm:px-6 py-4 border-b border-zinc-100 ${activeWeekData.isInherited ? 'bg-yellow-50/50' : 'bg-zinc-50/50'} flex flex-col sm:flex-row sm:items-center justify-between gap-3 sm:gap-0 transition-colors duration-300`}>
                          <div className="flex items-center space-x-3">
                            <span className="font-medium text-zinc-800">Week {currentWeek} 任務</span>
                            {activeWeekData.isInherited && (
                              <span className="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full border border-yellow-200">
                                繼承自上週 (點擊編輯即獨立)
                              </span>
                            )}
                          </div>
                          
                          <div className="flex items-center space-x-2" data-html2canvas-ignore="true">
                            <button onClick={addTask} className="text-xs flex items-center space-x-1 bg-zinc-900 text-white hover:bg-zinc-800 px-3 py-1.5 rounded-md shadow-sm transition-colors w-full sm:w-auto justify-center">
                              <Plus className="w-3 h-3" />
                              <span>新增任務</span>
                            </button>
                          </div>
                        </div>

                        {/* === 桌面版：傳統表格 (優雅捲軸) === */}
                        <div className="hidden md:block overflow-x-auto pb-4 custom-scrollbar relative">
                          <table className="w-full text-left border-collapse min-w-[1050px]">
                            <thead>
                              <tr>
                                <th className="px-6 py-3 text-xs font-medium text-zinc-400 border-b border-r border-zinc-100 w-[22%] sticky left-0 bg-white z-20">行動項目</th>
                                <th className="px-3 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 w-[12%]">關聯目標</th>
                                <th className="px-3 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 text-center w-[8%]">每週目標</th>
                                {DAYS.map(day => (
                                  <th key={day} className="px-2 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 text-center w-[5%]">{day}</th>
                                ))}
                                <th className="px-3 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 text-center w-[7%]">達成率</th>
                                <th className="px-3 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 w-[11%]">備註</th>
                                <th className="px-3 py-3 text-xs font-medium text-zinc-400 border-b border-zinc-100 text-center w-[5%]" data-html2canvas-ignore="true">操作</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-zinc-50">
                              {activeWeekData.tasks.length === 0 ? (
                                <tr><td colSpan={13} className="px-6 py-12 text-center text-zinc-400 text-sm">本週尚未建立任務。</td></tr>
                              ) : (
                                activeWeekData.tasks.map(task => {
                                  const taskCompletion = getTaskCompletionRate(task);
                                  return (
                                    <tr key={task.id} className="group hover:bg-zinc-50 transition-colors">
                                      <td className="px-6 py-4 text-sm font-medium text-zinc-700 sticky left-0 bg-white group-hover:bg-zinc-50 transition-colors z-10 border-r border-zinc-100">
                                        <input type="text" value={task.name} onChange={(e) => updateTaskName(task.id, e.target.value)} placeholder="任務名稱" className="bg-transparent border-b border-transparent hover:border-zinc-300 focus:border-zinc-900 focus:outline-none transition-colors w-full py-1" />
                                      </td>
                                      <td className="px-3 py-4 text-sm">
                                        <select value={task.goalId || ''} onChange={(e) => updateTaskGoal(task.id, e.target.value)} className="bg-zinc-100 hover:bg-zinc-200 text-zinc-600 text-xs px-2 py-1.5 rounded-md border-none focus:ring-2 focus:ring-zinc-900 focus:outline-none w-full truncate cursor-pointer transition-colors">
                                          <option value="">無關聯目標</option>
                                          {activeQuarter.lagging.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                        </select>
                                      </td>
                                      <td className="px-3 py-4 text-center">
                                        <div className="flex items-center justify-center space-x-1">
                                          <input type="number" min="1" max="7" value={task.targetDays !== undefined ? task.targetDays : 7} onChange={(e) => updateTaskTargetDays(task.id, e.target.value)} className="w-8 bg-transparent border-b border-zinc-200 hover:border-zinc-400 focus:border-zinc-900 focus:outline-none text-center text-sm transition-colors [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
                                          <span className="text-[10px] text-zinc-400">次</span>
                                        </div>
                                      </td>
                                      {task.days.map((isCompleted, dayIndex) => (
                                        <td key={dayIndex} className="px-2 py-4 text-center">
                                          <button onClick={() => toggleDay(task.id, dayIndex)} className="focus:outline-none transform transition-transform active:scale-90 p-2 -m-2">
                                            {isCompleted ? <CheckCircle2 className="w-5 h-5 text-zinc-900 mx-auto" /> : <Circle className="w-5 h-5 text-zinc-200 hover:text-zinc-400 mx-auto transition-colors" />}
                                          </button>
                                        </td>
                                      ))}
                                      <td className="px-3 py-4 text-center">
                                         <span className={`text-xs font-bold ${getThresholdColorText(taskCompletion)}`}>{taskCompletion}%</span>
                                      </td>
                                      <td className="px-3 py-4 text-sm">
                                        <input type="text" value={task.note || ''} onChange={(e) => updateTaskNote(task.id, e.target.value)} placeholder="備註..." className="bg-transparent border-b border-transparent hover:border-zinc-300 focus:border-zinc-900 focus:outline-none transition-colors w-full text-xs text-zinc-500 py-1" />
                                      </td>
                                      <td className="px-3 py-4 text-center" data-html2canvas-ignore="true">
                                        <button onClick={() => deleteTask(task.id)} className="text-zinc-300 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100 p-2 -m-2"><Trash2 className="w-4 h-4 mx-auto" /></button>
                                      </td>
                                    </tr>
                                  );
                                })
                              )}
                            </tbody>
                          </table>
                        </div>

                        {/* === 行動版：獨立卡片式排版 === */}
                        <div className="block md:hidden bg-[#fafafa] sm:bg-white p-2 sm:p-4 space-y-4">
                          {activeWeekData.tasks.length === 0 ? (
                            <div className="text-center text-zinc-400 py-8 text-sm">本週尚未建立任務。</div>
                          ) : (
                            activeWeekData.tasks.map(task => {
                              const taskCompletion = getTaskCompletionRate(task);
                              return (
                                <div key={task.id} className="bg-white p-4 rounded-xl border border-zinc-200 shadow-sm flex flex-col gap-4 relative">
                                  <div className="flex items-center justify-between gap-3">
                                     <input type="text" value={task.name} onChange={(e) => updateTaskName(task.id, e.target.value)} className="font-semibold text-zinc-800 bg-transparent border-b border-transparent focus:border-zinc-900 focus:outline-none w-full text-base" placeholder="任務名稱" />
                                     <button onClick={() => deleteTask(task.id)} className="p-2 -mr-2 text-zinc-300 hover:text-rose-500 transition-colors" data-html2canvas-ignore="true"><Trash2 className="w-4 h-4" /></button>
                                  </div>
                                  <div className="flex items-center justify-between gap-3 text-sm">
                                     <select value={task.goalId || ''} onChange={(e) => updateTaskGoal(task.id, e.target.value)} className="bg-zinc-100 text-zinc-600 text-xs px-2 py-2 rounded-lg border-none focus:outline-none flex-1 truncate">
                                        <option value="">無關聯目標</option>
                                        {activeQuarter.lagging.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                                     </select>
                                     <div className="flex items-center space-x-1 shrink-0 bg-zinc-100 px-3 py-1.5 rounded-lg">
                                        <span className="text-xs text-zinc-500">每週</span>
                                        <input type="number" min="1" max="7" value={task.targetDays !== undefined ? task.targetDays : 7} onChange={(e) => updateTaskTargetDays(task.id, e.target.value)} className="w-6 bg-transparent focus:outline-none text-center text-sm font-semibold text-zinc-700 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
                                        <span className="text-xs text-zinc-500">次</span>
                                     </div>
                                  </div>
                                  <div className="flex justify-between items-center py-3 border-y border-zinc-100">
                                     {task.days.map((isCompleted, dayIndex) => (
                                        <div key={dayIndex} className="flex flex-col items-center gap-1.5">
                                           <span className="text-[10px] text-zinc-400 font-medium">{['一','二','三','四','五','六','日'][dayIndex]}</span>
                                           <button onClick={() => toggleDay(task.id, dayIndex)} className="p-2 -m-2 focus:outline-none transform transition-transform active:scale-90">
                                              {isCompleted ? <CheckCircle2 className="w-7 h-7 text-zinc-900" /> : <Circle className="w-7 h-7 text-zinc-200" />}
                                           </button>
                                        </div>
                                     ))}
                                  </div>
                                  <div className="flex items-center justify-between gap-3">
                                     <input type="text" value={task.note || ''} onChange={(e) => updateTaskNote(task.id, e.target.value)} placeholder="點此新增備註..." className="bg-zinc-50 px-3 py-2 rounded-lg border border-transparent focus:border-zinc-300 focus:outline-none text-xs text-zinc-600 flex-1" />
                                     <div className="flex flex-col items-end shrink-0">
                                       <span className="text-[10px] text-zinc-400">達成率</span>
                                       <span className={`text-sm font-bold ${getThresholdColorText(taskCompletion)}`}>{taskCompletion}%</span>
                                     </div>
                                  </div>
                                </div>
                              )
                            })
                          )}
                        </div>
                       </>
                    )}

              </div>
            </section>
              </>
            )}

          </main>

          {/* 🌟 專屬的防彈跳 Custom Dialog */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" data-html2canvas-ignore="true">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
                <div className="p-6">
                  <h3 className="font-bold text-zinc-900 mb-2 text-lg">系統提示</h3>
                  <p className="text-sm text-zinc-600 leading-relaxed">{dialog.message}</p>
                </div>
                <div className="px-6 py-4 bg-zinc-50 border-t border-zinc-100 flex justify-end space-x-3">
                  {dialog.type === 'confirm' && (
                    <button onClick={() => setDialog({ ...dialog, isOpen: false })} className="px-4 py-2 text-sm font-medium text-zinc-500 hover:text-zinc-800 transition-colors">取消</button>
                  )}
                  <button 
                    onClick={() => {
                      if(dialog.onConfirm) dialog.onConfirm();
                      setDialog({ ...dialog, isOpen: false });
                    }} 
                    className="px-5 py-2 text-sm font-medium bg-zinc-900 text-white rounded-lg hover:bg-zinc-800 transition-colors shadow-sm"
                  >
                    確定
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 帳號登入/註冊 Modal */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" data-html2canvas-ignore="true">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                <div className="px-6 py-4 border-b border-zinc-100 flex items-center justify-between">
                  <h3 className="font-medium text-zinc-900 flex items-center">
                    <UserCircle className="w-5 h-5 mr-2 text-zinc-500" />
                    {authMode === 'login' ? '登入以同步資料' : '註冊新帳號'}
                  </h3>
                  <button onClick={() => setShowAuthModal(false)} className="text-zinc-400 hover:text-zinc-600 transition-colors"><X className="w-5 h-5" /></button>
                </div>
                
                <form onSubmit={handleAuthSubmit} className="p-6 space-y-4">
                  {authError && (
                    <div className="p-3 bg-rose-50 text-rose-600 text-xs rounded-lg border border-rose-100">
                      {authError}
                    </div>
                  )}
                  
                  <div>
                    <label className="block text-xs font-medium text-zinc-500 mb-1">電子信箱 Email</label>
                    <input 
                      type="email" 
                      required
                      value={authEmail}
                      onChange={(e) => setAuthEmail(e.target.value)}
                      className="w-full px-3 py-2 border border-zinc-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-zinc-900 text-sm"
                      placeholder="your@email.com"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-xs font-medium text-zinc-500 mb-1">密碼 Password</label>
                    <input 
                      type="password" 
                      required
                      minLength={6}
                      value={authPassword}
                      onChange={(e) => setAuthPassword(e.target.value)}
                      className="w-full px-3 py-2 border border-zinc-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-zinc-900 text-sm"
                      placeholder="至少 6 個字元"
                    />
                  </div>

                  <button 
                    type="submit" 
                    disabled={authLoading}
                    className="w-full py-2.5 bg-zinc-900 text-white rounded-lg text-sm font-medium hover:bg-zinc-800 transition-colors disabled:opacity-50 mt-4"
                  >
                    {authLoading ? '處理中...' : (authMode === 'login' ? '登入帳號' : '註冊並綁定當前資料')}
                  </button>

                  <div className="text-center mt-4">
                    <button 
                      type="button"
                      onClick={() => {
                        setAuthMode(authMode === 'login' ? 'register' : 'login');
                        setAuthError('');
                      }}
                      className="text-xs text-zinc-500 hover:text-zinc-900 transition-colors underline underline-offset-2"
                    >
                      {authMode === 'login' ? '還沒有帳號？點此註冊' : '已經有帳號了？點此登入'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Modal - 新增年份 */}
          {showYearModal && (
            <div className="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4" data-html2canvas-ignore="true">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
                <div className="px-6 py-4 border-b border-zinc-100 flex items-center justify-between">
                  <h3 className="font-medium text-zinc-900 flex items-center">新增年份</h3>
                  <button onClick={() => setShowYearModal(false)} className="text-zinc-400 hover:text-zinc-600 transition-colors"><X className="w-5 h-5" /></button>
                </div>
                
                <div className="p-6">
                  <label className="block text-xs font-medium text-zinc-500 mb-2">請輸入您要新增的年份 (例如 2027)</label>
                  <input 
                    type="number" 
                    value={yearInput} 
                    onChange={(e) => setYearInput(e.target.value)}
                    className="w-full px-3 py-2 border border-zinc-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-zinc-900 text-sm [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                    autoFocus
                  />
                </div>

                <div className="px-6 py-4 bg-zinc-50 border-t border-zinc-100 flex justify-end space-x-3">
                  <button onClick={() => setShowYearModal(false)} className="px-4 py-2 text-sm font-medium text-zinc-600 hover:text-zinc-900 transition-colors">取消</button>
                  <button onClick={confirmAddYear} className="px-4 py-2 text-sm font-medium bg-zinc-900 text-white rounded-lg hover:bg-zinc-800 transition-colors shadow-sm">確認新增</button>
                </div>
              </div>
            </div>
          )}

          {/* 異常警告橫幅 */}
          {hasLoadWarning && (
            <div className="fixed bottom-0 left-0 w-full bg-amber-50 border-t border-amber-200 p-3 sm:p-4 text-xs sm:text-sm text-amber-700 flex justify-between items-start sm:items-center z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]" data-html2canvas-ignore="true">
              <div className="flex items-start sm:items-center">
                <span className="text-amber-500 mr-2 text-base leading-none">⚠️</span>
                <span>網路環境受限，目前以本地模式執行。若需跨裝置同步，請嘗試點擊右上角「登入」或切換至一般瀏覽器。</span>
              </div>
              <button onClick={() => setHasLoadWarning(false)} className="text-amber-500 hover:text-amber-700 p-1 -m-1 ml-4 shrink-0">
                <X className="w-4 h-4" />
              </button>
            </div>
          )}

        </div>
      );
    }

    // --- 7. 渲染 React 應用 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
